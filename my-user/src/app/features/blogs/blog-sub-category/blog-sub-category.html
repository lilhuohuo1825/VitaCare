<main class="bv-subcategory-page">
    <!-- Breadcrumb Section -->
    <div class="bv-container">
        <nav class="breadcrumb-vc">
            <div class="breadcrumb-item"><a routerLink="/">Trang chủ</a></div>
            <div class="breadcrumb-item"><a routerLink="/blog">Góc sức khoẻ</a></div>
            <div class="breadcrumb-item"><a [routerLink]="['/blog/danh-muc', categorySlug]">{{ categoryName }}</a>
            </div>
            <div class="breadcrumb-item active">{{ subcategoryName }}</div>
        </nav>
    </div>

    <section class="bv-hero-section">
        <div class="bv-hero-title-box">
            <h1 class="bv-title">{{ subcategoryName }}</h1>
        </div>
    </section>

    <!-- Content Section -->
    <div class="bv-container mt-5">
        <div class="bv-section-header mb-3">
            <i class="bi bi-book-half bv-section-icon me-2"></i>
            <span class="bv-section-title fw-bold">Các bài viết liên quan</span>
        </div>

        <!-- Loading state -->
        <div *ngIf="loading" class="bv-loading-new">
            <app-loading-shipping text="Đang tải bài viết..."></app-loading-shipping>
        </div>

        <!-- Empty state -->
        <div *ngIf="!loading && blogs.length === 0" class="bv-no-data text-center py-5">
            <i class="bi bi-journal-x fs-1 text-light"></i>
            <p class="mt-3 fs-5 text-secondary">Chưa có bài viết nào trong danh mục này.</p>
            <button routerLink="/blog" class="btn btn-primary rounded-pill px-4 mt-2">Quay lại trang chính</button>
        </div>

        <!-- Article Grid -->
        <div *ngIf="!loading && blogs.length > 0" class="row g-4 mb-5">
            <div class="col-12 col-sm-6 col-md-4 col-lg-3" *ngFor="let blog of displayedBlogs">
                <a [routerLink]="blog.link" class="bv-blog-card">
                    <div class="bv-blog-img-wrapper">
                        <img [src]="blog.image" [alt]="blog.title" class="bv-blog-img">
                    </div>
                    <div class="bv-blog-content">
                        <h3 class="bv-blog-title">{{ blog.title }}</h3>
                    </div>
                </a>
            </div>
        </div>

        <!-- Pagination -->
        <div *ngIf="remainingCount > 0" class="text-center mb-5 pb-5">
            <button class="bv-load-more-btn" (click)="loadMore()">
                <i class="bi bi-chevron-double-down"></i> Xem thêm {{ remainingCount }} bài viết
            </button>
        </div>
    </div>
</main>
