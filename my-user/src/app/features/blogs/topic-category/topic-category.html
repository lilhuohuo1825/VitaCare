<main class="tc-page">
    <div class="tc-container">
        <div class="tc-content-wrapper">
            <!-- Main Content -->
            <div class="tc-main">
                <!-- Breadcrumb -->
                <nav class="breadcrumb-vc">
                    <div class="breadcrumb-item"><a routerLink="/">Trang chủ</a></div>
                    <div class="breadcrumb-item"><a routerLink="/topic">Chuyên đề</a></div>
                    <div class="breadcrumb-item active">{{ tagName }}</div>
                </nav>

                <header class="tc-header">
                    <h1 class="tc-title">Bài viết {{ tagName }}</h1>
                    <div class="tc-stats" *ngIf="total > 0">
                        <span>{{ total }} bài viết</span>
                    </div>
                </header>

                <!-- Loading State -->
                <div *ngIf="loading && blogs.length === 0" class="tc-loading-new">
                    <app-loading-shipping text="Đang tải bài viết..."></app-loading-shipping>
                </div>

                <!-- Articles List -->
                <div class="tc-list" *ngIf="blogs.length > 0">
                    <div *ngFor="let blog of blogs" class="tc-card">
                        <a [attr.href]="blog.link" (click)="openQuickView($event, blog)" class="tc-card-img-link">
                            <img [src]="blog.image" [alt]="blog.title" class="tc-card-img">
                        </a>
                        <div class="tc-card-body">
                            <div class="tc-card-badge">{{ blog.categoryName }}</div>
                            <h2 class="tc-card-title">
                                <a [attr.href]="blog.link" (click)="openQuickView($event, blog)">{{ blog.title }}</a>
                            </h2>
                            <p class="tc-card-excerpt">{{ blog.excerpt }}</p>
                        </div>
                    </div>
                </div>

                <!-- Empty State -->
                <div *ngIf="!loading && blogs.length === 0" class="tc-empty">
                    <i class="bi bi-journal-x"></i>
                    <p>Chưa có bài viết nào cho chủ đề này.</p>
                </div>

                <!-- Load More -->
                <div class="tc-load-more" *ngIf="remainingCount > 0">
                    <button (click)="loadMore()" class="tc-load-more-btn" [disabled]="loading">
                        <span *ngIf="!loading">Xem thêm {{ remainingCount }} bài viết</span>
                        <span *ngIf="loading">Đang tải...</span>
                    </button>
                </div>
            </div>

            <!-- Sidebar (Optional, could be added later for better UX) -->
            <aside class="tc-sidebar">
                <!-- Chuyên đề nổi bật -->
                <div class="bv-featured-topics-box">
                    <h3 class="bv-ft-title">Chuyên đề nổi bật</h3>
                    <div class="bv-ft-list">
                        <ng-container *ngFor="let item of featuredTopicCategories">
                            <a *ngIf="item.name.toLowerCase().indexOf('khuyến mãi') === -1 && item.name.toLowerCase().indexOf('phân loại') === -1 && item.name.toLowerCase().indexOf('truyền thông') === -1"
                                [routerLink]="['/topic', item.slug]" class="bv-ft-item"
                                [attr.data-category]="item.name">
                                <span class="bv-ft-name"># {{ item.name }}</span>
                                <span class="bv-ft-count">{{ item.count }} bài viết</span>
                            </a>
                        </ng-container>
                    </div>
                    <a routerLink="/topic" class="bv-ft-viewall">Xem tất cả <i class="bi bi-chevron-right"></i></a>
                </div>
            </aside>
        </div>
    </div>
</main>
