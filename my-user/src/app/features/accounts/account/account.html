<div class="page-container">
  <div class="vc_container pt-2" *ngIf="activeMenu !== 'notifications' && activeMenu !== 'reviews'">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb-vc">
        <li class="breadcrumb-item"><a routerLink="/">Trang chủ</a></li>
        <li class="breadcrumb-item"><a routerLink="/account" [queryParams]="{ menu: 'info' }">Cá nhân</a></li>
        <li class="breadcrumb-item active" aria-current="page">{{ breadcrumbLabel }}</li>
      </ol>
    </nav>
  </div>
  <div class="vc_container">
    <!-- Account Component - User Profile Sidebar -->
    <div class="account-wrapper" [class.account-wrapper--health-full]="activeMenu === 'health'">
      <!-- User Profile Card with Menu (ẩn khi đang xem Sổ sức khỏe) -->
      <div class="account-sidebar" *ngIf="activeMenu !== 'health'">
        <!-- User Avatar & Info -->
        <div class="user-profile-header">
          <div class="user-avatar">
            <img *ngIf="!avatarError" [src]="userAvatar" alt="Avatar" class="avatar-img" (error)="avatarError = true">
            <i *ngIf="avatarError" class="bi bi-person-circle avatar-placeholder" aria-hidden="true"></i>
          </div>
          <h4 class="user-name">{{ userName }}</h4>
          <p class="user-phone">{{ userPhone }}</p>
        </div>

        <!-- Navigation Menu -->
        <nav class="account-nav">
          <a href="#" class="nav-item" [class.active]="activeMenu === 'info'" (click)="setActiveMenu('info', $event)">
            <i class="bi bi-info-circle nav-icon" aria-hidden="true"></i>
            <span>Thông tin cá nhân</span>
          </a>
          <a href="#" class="nav-item" [class.active]="activeMenu === 'orders'"
            (click)="setActiveMenu('orders', $event)">
            <i class="bi bi-box-seam nav-icon" aria-hidden="true"></i>
            <span>Đơn hàng của tôi</span>
          </a>
          <a href="#" class="nav-item" [class.active]="activeMenu === 'prescriptions'"
            (click)="setActiveMenu('prescriptions', $event)">
            <i class="bi bi-capsule nav-icon" aria-hidden="true"></i>
            <span>Đơn thuốc của tôi</span>
          </a>
          <a href="#" class="nav-item" [class.active]="activeMenu === 'addresses'"
            (click)="setActiveMenu('addresses', $event)">
            <i class="bi bi-geo-alt nav-icon" aria-hidden="true"></i>
            <span>Quản lý số địa chỉ</span>
          </a>
          <a href="#" class="nav-item" [class.active]="activeMenu === 'health'"
            (click)="setActiveMenu('health', $event)">
            <i class="bi bi-heart-pulse nav-icon" aria-hidden="true"></i>
            <span>Quản lý sổ sức khỏe</span>
          </a>
          <a href="#" class="nav-item" [class.active]="activeMenu === 'remind'"
            (click)="setActiveMenu('remind', $event)">
            <i class="bi bi-clock-history nav-icon" aria-hidden="true"></i>
            <span>Nhắc lịch uống thuốc</span>
          </a>
          <a href="#" class="nav-item" [class.active]="activeMenu === 'reviews'"
            (click)="setActiveMenu('reviews', $event)">
            <i class="bi bi-star nav-icon" aria-hidden="true"></i>
            <span>Quản lý đánh giá</span>
          </a>
          <a href="#" class="nav-item" [class.active]="activeMenu === 'returns'"
            (click)="setActiveMenu('returns', $event)">
            <i class="bi bi-arrow-return-left nav-icon" aria-hidden="true"></i>
            <span>Quản lý đổi trả</span>
          </a>
          <a href="#" class="nav-item" [class.active]="activeMenu === 'notifications'"
            (click)="setActiveMenu('notifications', $event)">
            <i class="bi bi-bell nav-icon" aria-hidden="true"></i>
            <span>Thông báo</span>
            <span class="notification-badge" *ngIf="notificationCount > 0">{{ notificationCount }}</span>
          </a>
        </nav>

        <!-- Logout Button -->
        <div class="logout-section">
          <button type="button" class="btn-logout" (click)="logout()">
            <i class="bi bi-box-arrow-right nav-icon" aria-hidden="true"></i>
            <span>Đăng xuất</span>
          </button>
        </div>
      </div>

      <!-- Content Area -->
      <div class="account-content">
        <app-info *ngIf="activeMenu === 'info'"></app-info>
        <app-orders *ngIf="activeMenu === 'orders'" [userId]="authService.currentUser()?.user_id"></app-orders>
        <app-prescriptions *ngIf="activeMenu === 'prescriptions'"
          [userId]="authService.currentUser()?.user_id"></app-prescriptions>
        <app-addresses *ngIf="activeMenu === 'addresses'"></app-addresses>
        <app-health *ngIf="activeMenu === 'health'"></app-health>
        <app-remind *ngIf="activeMenu === 'remind'"></app-remind>
        <app-reviews *ngIf="activeMenu === 'reviews'" [userId]="authService.currentUser()?.user_id"
          [forceReload]="reviewsReloadTrigger"></app-reviews>
        <app-return-management *ngIf="activeMenu === 'returns'"
          [userId]="authService.currentUser()?.user_id"></app-return-management>
        <app-notice *ngIf="activeMenu === 'notifications'"></app-notice>
      </div>
    </div>
  </div>
</div>
